name: Scheduled Playwright Test Run

on:
  schedule:
    - cron: '30 23 * * *'  # Runs daily at 23:30 UTC (approx. 5:30pm CST)
  workflow_dispatch: {}

jobs:
  playwright-test:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm test

      - name: Create failure issue
        if: ${{ failure() }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = 'Scheduled Playwright Test Failure';
            const body = `The scheduled Playwright automation run failed.

            Repository: ${context.repo.owner}/${context.repo.repo}
            Workflow: ${context.workflow}
            Run number: ${context.runNumber}
            Run URL: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}

            Please review the test output and fix the failing test(s).`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
            });
